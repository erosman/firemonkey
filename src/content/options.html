<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="options">FireMonkey </title>
    <link href="../image/icon.svg" rel="icon" type="image/svg+xml">
    <link href="options.css" rel="stylesheet">
    <script src="options.js" type="module"></script>

    <!-- custom style -->
    <style></style>
  </head>
  <body>

    <!-- <input type="checkbox" id="sidebar" class="control"> -->
    <!-- Navigation -->
    <nav>
      <!-- <label for="sidebar" data-i18n="sidebar|title"><img src="../image/sidebars.svg" alt="" style="width: 1.2em;"></label> -->
      <label data-i18n="options"><input type="radio" name="nav" id="nav3" checked></label>
      <label data-i18n="scripts"><input type="radio" name="nav" id="nav4"></label>
      <label data-i18n="log"><input type="radio" name="nav" id="nav5"></label>
      <label data-i18n="help"><input type="radio" name="nav" id="nav1"></label>
      <label data-i18n="about"><input type="radio" name="nav" id="nav2"></label>
      <label><a href="../locale-maker/locale-maker.html" target="_blank">Locale Maker</a></label>
    </nav>

    <div class="progress-bar"></div>

    <article>
      <!-- Help/About -->
      <section class="help"><iframe src="help.html"></iframe></section>
      <section class="about"><iframe src="about.html"></iframe></section>

      <!-- user options -->
      <section class="options">
        <fieldset>
          <div class="buttons">
            <label class="button" data-i18n="import"><input type="file" id="file" accept=".json"></label>
            <button type="button" id="export" data-i18n="export"></button>
            <button type="button" data-i18n="importFromUrl"></button>
          </div>

          <div class="columns">
            <label data-i18n="autoUpdateInterval" data-link="#auto-update-interval"></label>
            <input type="number" id="autoUpdateInterval" min="0" max="30">
            <p class="description" data-i18n="autoUpdateIntervalDescription"></p>
          </div>

          <label data-i18n="enableSync"><input type="checkbox" id="sync"></label>
          <p class="description" data-i18n="enableSyncDescription"></p>

          <label data-i18n="counter"><input type="checkbox" id="counter"></label>
          <p class="description" data-i18n="counterDescription"></p>

          <label data-i18n="globalExclude" data-link="#global-exclude"></label>
          <p class="description" data-i18n="globalExcludeDescription"></p>
          <textarea id="globalExclude" spellcheck="false" autocomplete="off" placeholder="*://*.example.com/*"></textarea>

          <details class="advanced">
            <summary data-i18n="advanced"></summary>

            <label data-i18n="cspExclude" data-link="#csp-exclude"></label>
            <p class="description" data-i18n="cspExcludeDescription"></p>
            <textarea id="cspExclude" spellcheck="false" autocomplete="off" placeholder="*://*.example.com/*"></textarea>

            <label data-i18n="editorOptions" data-link="#editor-options"></label>
            <p class="description" data-i18n="editorOptionsDescription"></p>
            <textarea id="editorOptions" spellcheck="false" autocomplete="off" placeholder="{
  &quot;tabSize&quot;: 4
}"></textarea>

            <label data-i18n="linterOptions" data-link="#linter-options"></label>
            <div class="two-column">
              <p class="description" data-i18n="linterOptionsDescription" style="margin-bottom: 0.5em;"></p>
              <p class="description" data-i18n="activeRules"></p>

              <textarea id="linterOptions" spellcheck="false" autocomplete="off" placeholder="{
  &quot;eqeqeq&quot;: &quot;off&quot;
}"></textarea>
              <textarea class="active-rules" spellcheck="false" autocomplete="off" readonly></textarea>
            </div>


            <label data-i18n="customOptionsCSS" data-link="#custom-options-css"></label>
            <p class="description" data-i18n="customOptionsCSSDescription"></p>
            <textarea id="customOptionsCSS" spellcheck="false" autocomplete="off" placeholder=".editor {
  font-family: monospace;
}"></textarea>

            <label data-i18n="customPopupCSS" data-link="#custom-popup-css"></label>
            <p class="description" data-i18n="customPopupCSSDescription"></p>
            <textarea id="customPopupCSS" spellcheck="false" autocomplete="off" placeholder="ul {
  height: 15em;
}"></textarea>

          </details>

          <button type="submit" data-i18n="save"></button>
        </fieldset>

      </section>
      <!-- /user options -->

      <section class="scripts">
        <aside>
          <div class="list">
            <label><input type="checkbox" class="list-enable"><img src="../image/js.svg" alt=""><img src="../image/css.svg" alt=""></label>
            <label><input type="checkbox" class="list-disable"><img src="../image/js.svg" alt=""><img src="../image/css.svg" alt=""></label>
            <label><input type="checkbox" class="list-js"><img src="../image/js.svg" alt=""></label>
            <label><input type="checkbox" class="list-css"><img src="../image/css.svg" alt=""></label>
          </div>

          <ul></ul>

          <!-- counter -->
          <div class="counter"></div>
          <div class="buttons">
            <label class="button" data-i18n="import"><input type="file" id="fileScript" accept=".js, .css" multiple></label>
            <button type="button" data-i18n="export"></button>
          </div>
        </aside>

        <div class="content">
          <input type="checkbox" id="settings" class="control" autocomplete="off">

          <div class="menu">
            <label class="button" for="settings" data-i18n="settings|title"><img src="../image/settings.svg" alt=""></label>
            <button data-i18n="save"></button>
            <button data-i18n="update|title"><img src="../image/category-sync.svg" alt=""></button>
            <button data-i18n="upload|title"><img src="../image/upload.svg" alt=""></button>
            <label class="button" data-i18n="enable|title"><input type="checkbox" class="toggle" id="enable" autocomplete="off"></label>
            <label class="button" data-i18n="autoUpdate|title"><input type="checkbox" id="autoUpdate" autocomplete="off"><img src="../image/view-history.svg" alt=""></label>
            <button type="button" data-i18n="newJS|title"><img src="../image/plus.svg" alt=""><img src="../image/js.svg" alt=""></button>
            <button type="button" data-i18n="newCSS|title"><img src="../image/plus.svg" alt=""><img src="../image/css.svg" alt=""></button>
            <button type="button" data-i18n="delete|title"><img src="../image/delete.svg" alt=""></button>
          </div>

          <div class="settings">
            <label data-i18n="userMeta"></label>
            <textarea id="userMeta" rows="10" spellcheck="false" style="margin-bottom: 0;"></textarea>
            <select id="userMetaSelect">
              <option disabled selected>&nbsp;</option>
              <option>@disable-container</option>
              <option>@disable-exclude-match</option>
              <option>@disable-exclude</option>
              <option>@disable-include</option>
              <option>@disable-match</option>
              <hr>
              <option value="@allFrames          true">@allFrames</option>
              <option>@connect</option>
              <option value="@container          container-1">@container</option>
              <option value="@exclude-match      *://*/*">@exclude-match</option>
              <option>@group</option>
              <option value="@inject-into        page">@inject-into</option>
              <option value="@match              *://*/*">@match</option>
              <option value="@matchAboutBlank    true">@matchAboutBlank</option>
              <option>@metaURL</option>
              <option value="@origin             user">@origin</option>
              <option value="@run-at             document-start">@run-at</option>
              <option>@updateURL</option>
              <option>@uploadURL</option>
            </select>

            <label data-i18n="storage"></label>
            <textarea id="storage" rows="10" spellcheck="false"></textarea>

            <label data-i18n="userVar"></label>
            <ul class="user-var"></ul>
            <button type="button" class="user-var" data-i18n="reset"></button>
          </div>

          <fieldset>
            <legend class="js" data-i18n="scripts"></legend>
            <div class="editor"></div>
          </fieldset>
        </div>
      </section>


      <!-- log -->
      <section class="log">
        <table>
          <thead>
            <tr>
              <th data-i18n="time"></th>
              <th data-i18n="reference"></th>
              <th class="message">
                <span data-i18n="message"></span>
                <span data-i18n="log"></span>
                <input type="number" id="logSize" min="100" max="1000" step="100" value="100">
              </th>
             </tr>
          </thead>
          <tbody>
            <!-- template -->
            <template><tr><td></td><td></td><td></td></tr></template>
          </tbody>
        </table>
      </section>

    </article>
  </body>
</html>
